- id: strategy_recommendations
  type: object_type
  label: strategy_recommendations
  status: active
- id: action_tasks
  type: object_type
  label: action_tasks
  status: active
- id: event_outbox
  type: dataset
  label: event_outbox (dispatch queue)
  status: active
- id: feishu_daily_metrics
  type: sync
  label: 飞书-每日经营指标
  status: active
- id: feishu_alert_events
  type: sync
  label: 飞书-异常事件表
  status: active
- id: feishu_action_tasks
  type: sync
  label: 飞书-负责人任务表
  status: active
