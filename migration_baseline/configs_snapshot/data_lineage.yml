  status: active
- id: feishu_review_retro
  type: sync
  label: 飞书-执行复盘表
  status: active
edges:
- from: raw_orders_csv
  to: dwd_order_level
  transform: 'CSV ingestion: orders + payments + reviews'
  transform_type: batch_load
- from: raw_customers_csv
  to: dwd_order_level
  transform: 'join: customer_id + customer_unique_id'
  transform_type: batch_load
- from: raw_order_items_csv
  to: dwd_item_level
  transform: 'CSV ingestion: items + products + sellers'
  transform_type: batch_load
- from: raw_products_csv
  to: dwd_item_level
  transform: 'join: product_category_name_english'
  transform_type: batch_load
- from: raw_sellers_csv
  to: dwd_item_level
  transform: 'join: seller_state'
  transform_type: batch_load
- from: dwd_order_level
  to: metric_daily
  transform: daily GMV, orders, review_score, late_rate, cancel_rate
  transform_type: sql_aggregation
- from: dwd_item_level
  to: metric_daily
  transform: daily seller_count, freight_value
  transform_type: sql_aggregation
- from: dwd_order_level
  to: metric_dimension_daily
  transform: dimension grouping seller/category/region
  transform_type: sql_aggregation
- from: dwd_item_level
  to: metric_dimension_daily
  transform: dimension grouping seller/category/region
  transform_type: sql_aggregation
- from: metric_daily
  to: alert_events
  transform: global anomaly detection (5 rules)
  transform_type: heuristic_rule
- from: metric_dimension_daily
  to: alert_events
  transform: dimensional anomaly detection
  transform_type: heuristic_rule
- from: alert_events
  to: strategy_recommendations
  transform: heuristic template to recommendation
  transform_type: heuristic_rule
- from: strategy_recommendations
  to: action_tasks
  transform: recommendation to work item
  transform_type: template_instantiation
- from: action_tasks
  to: event_outbox
  transform: severity to channel routing
  transform_type: channel_routing
- from: event_outbox
  to: feishu_daily_metrics
  transform: export metrics to Feishu
  transform_type: api_sync
- from: event_outbox
  to: feishu_alert_events
  transform: dispatch alert to Feishu chat
  transform_type: api_sync
- from: feishu_action_tasks
  to: review_retro
  transform: import human status to SQLite
  transform_type: api_sync
