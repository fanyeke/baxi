input:
  - source: data/aip/aip_context_bundle.json
    description: "AIP上下文包（指标+事件+建议+对象摘要+允许的动作）"
    format: json
    required: true
    schema:
      snapshot_date: string
      metrics: array
      events: array
      recommendations: array
      business_objects_summary: array
      allowed_actions: array
      owner_mapping: object

  - source: data/ads/metric_alerts.csv
    description: "异常事件原始记录"
    format: csv
    required: true

  - source: config/owner_mapping.yml
    description: "负责人路由表"
    format: yaml
    required: true

  - source: config/action_registry.yml
    description: "Agent允许执行的动作列表"
    format: yaml
    required: true

output:
  - target: data/outputs/daily_report.md
    description: "每日经营分析报告（Markdown格式）"
    format: markdown
    required: true
    must_contain: [simulated_date, real_run_date]

  - target: data/outputs/feishu_message.json
    description: "飞书消息JSON"
    format: json
    required: true
    schema:
      title: string
      content: string
      attachments: array

  - target: data/outputs/strategy_recommendations.json
    description: "策略建议JSON"
    format: json
    required: false

  - target: data/outputs/action_tasks.json
    description: "待执行任务JSON"
    format: json
    required: false

constraints:
  - "Wake Agent只能在action_registry.yml中定义的动作范围内选择"
  - "所有输出格式必须固定，不可随意更改schema"
  - "daily_report.md必须包含simulated_date和real_run_date"
  - "不得直接读取原始CSV文件"
  - "不得修改data/raw/下的任何文件"
