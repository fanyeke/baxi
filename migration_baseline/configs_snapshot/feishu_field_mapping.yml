daily_metrics:
  local_table: data/ads/daily_metrics.csv
  feishu_table: "每日经营指标"
  primary_key: [simulated_date]
  sync_frequency: daily
  fields:
    real_run_date: "执行日期"
    simulated_date: "业务日期"
    gmv: "GMV(R$)"
    order_count: "订单数"
    customer_count: "客户数"
    seller_count: "卖家数"
    avg_order_value: "客单价(R$)"
    avg_review_score: "平均评分"
    low_review_rate: "差评率"
    late_delivery_rate: "延迟配送率"
    cancel_rate: "取消率"
    payment_installment_rate: "分期支付率"
    marketing_seller_share: "营销卖家占比"

alert_events:
  local_table: data/feishu/alert_events_for_feishu.csv
  feishu_table: "异常事件表"
  primary_key: [event_id]
  sync_frequency: on_alert
  fields:
    event_id: "事件ID"
    event_date: "业务日期"
    rule_id: "规则ID"
    metric_name: "指标名称"
    severity: "严重等级"
    object_type: "对象类型"
    object_id: "对象ID"
    current_value: "当前值"
    baseline_value: "基线值"
    change_rate: "变化率"
    sample_size: "样本量"
    affected_orders: "影响订单数"
    affected_gmv: "影响GMV"
    impact_score: "影响评分"
    description: "异常描述"
    owner_role: "负责人角色"
    status: "状态"

strategy_recommendations:
  local_table: data/feishu/strategy_recommendations_for_feishu.csv
  feishu_table: "策略建议表"
  primary_key: [recommendation_id]
  sync_frequency: on_recommendation
  fields:
    recommendation_id: "建议ID"
    event_id: "关联事件ID"
    decision_source: "决策来源"
    rule_id: "规则ID"
    strategy_title: "策略标题"
    strategy_detail: "策略详情"
    target_object_type: "目标对象类型"
    target_object_id: "目标对象ID"
    expected_impact: "预期影响"
    risk_level: "风险等级"
    confidence: "置信度"
    owner_role: "负责人"
    approval_status: "审批状态"
    execution_status: "执行状态"
    success_metric: "成功指标"
    created_at: "创建时间"

action_tasks:
  local_table: data/feishu/action_tasks_for_feishu.csv
  feishu_table: "负责人任务表"
  primary_key: [task_id]
  sync_frequency: on_task
  fields:
    task_id: "任务ID"
    recommendation_id: "关联建议ID"
    event_id: "关联事件ID"
    task_title: "任务标题"
    task_description: "任务说明"
    task_source: "任务来源"
    owner_role: "负责人"
    priority: "优先级"
    status: "状态"
    feedback: "反馈"
    due_at: "截止时间"
    created_at: "创建时间"

# HUMAN_FIELDS: status, feedback are human-editable in Feishu
# These fields are populated by humans during task execution review.
# sync_feishu_bitable.py bidirectional sync writes them back to local DB.
review_retro:
  local_table: data/feishu/review_retro_for_feishu.csv
  feishu_table: "执行复盘表"
  primary_key: [review_id]
  sync_frequency: manual
  fields:
    review_id: "复盘ID"
    strategy_id: "策略ID"
    outcome: "执行结果"
    actual_impact: "实际影响"
    is_effective: "是否有效"
    lessons_learned: "经验总结"
    promote_to_rule: "是否沉淀为规则"
