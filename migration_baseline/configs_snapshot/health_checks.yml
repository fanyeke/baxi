# Data health checks for Baxi v0.5.3
# Reference: docs/governance/baxi_data_health_checks.md
# References existing data_quality_rules.yml (enhance, not replace)
# Tier 1: Monitoring Views — scope-based rules that scale automatically
# Tier 2: Health Checks — per-resource, fine-grained validation

# Tier 1: Monitoring Views — scope-based rules that scale automatically
monitoring_views:
  - id: all_dwd_tables_freshness
    scope: "all sqlite_tables where name LIKE 'dwd_%'"
    check_type: freshness
    rule: "last_build_time < 24h"
    severity: error
    alert_channels: [notification, email_digest]
  - id: all_metrics_completeness
    scope: "all sqlite_tables where name LIKE 'metric_%'"
    check_type: completeness
    rule: "row_count > 0 for last 7 days"
    severity: error
    alert_channels: [notification]

# Tier 2: Health Checks — per-resource, fine-grained validation
health_checks:
  - id: lineage_completeness
    resource: data_lineage
    description: "All DWD tables have lineage edges to downstream metrics"
    check_type: lineage
    validation: "for each dataset node in lineage, verify >= 1 outgoing edge to metric node"
    severity: warning
    alert_channels: [notification]
  - id: classification_coverage
    resource: data_classification
    description: "All SQLite tables have a classification entry"
    check_type: governance
    validation: "for each sqlite_table in catalog, verify exists in classifications"
    severity: error
    alert_channels: [notification, email_digest]
  - id: marking_propagation
    resource: data_markings
    description: "PII-marked fields have downstream propagation rules defined"
    check_type: governance
    validation: "for each marking with PII level, verify inheritance paths include data_dependency"
    severity: warning
  - id: checkpoint_audit_gap
    resource: governance_checkpoints
    description: "All apply operations have corresponding checkpoint records"
    check_type: audit
    validation: "compare outbox dispatch count with checkpoint record count for same time window"
    severity: error
  - id: schema_content_validation
    resource: dwd_order_level
    description: "Order dates are within valid range"
    check_type: content
    validation: "order_purchase_timestamp BETWEEN '2016-01-01' AND '2018-12-31'"
    severity: error
