# Decision evaluation rules for Baxi v0.5.3
# Reference: docs/governance/baxi_decision_eval_policy.md
# Evaluation dimensions for heuristic (and future LLM) strategy quality scoring
# Each dimension scores 0 (not satisfied) or 1 (satisfied), weighted sum

evaluation_dimensions:
  - id: has_trigger_event
    description: "策略必须有触发事件"
    weight: 1.0
  - id: has_target_object
    description: "策略必须指向具体业务对象"
    weight: 1.0
  - id: has_evidence
    description: "策略必须有数据证据支持"
    weight: 1.0
  - id: has_owner_role
    description: "策略必须有负责人角色"
    weight: 0.5
  - id: has_success_metric
    description: "策略必须有成功指标"
    weight: 1.0
  - id: has_risk_level
    description: "策略必须有风险评估"
    weight: 0.5
  - id: not_overgeneralized
    description: "策略不应对所有对象一概而论"
    weight: 1.0
  - id: not_duplicate
    description: "策略不应与已有活跃策略重复"
    weight: 1.0

pass_threshold: 6.0
