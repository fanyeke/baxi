data_catalog:
  objects:
  - object_type_id: customer
    display_name: 客户
    sensitivity: L4
    owner_role: business_ops
    description: 客户实体，包含客户购买行为和地理信息
    source_tables:
    - dwd_order_level
    grain: customer_unique_id
    retention_days: 730
    property_count: 8
    pii_field_count: 1
    allow_sync_to_feishu: false
  - object_type_id: order
    display_name: 订单
    sensitivity: L1
    owner_role: business_ops
    description: 订单实体，包含订单状态、金额、支付信息
    source_tables:
    - dwd_order_level
    grain: order_id
    retention_days: 825
    property_count: 7
    pii_field_count: 0
    allow_sync_to_feishu: false
  - object_type_id: seller
    display_name: 卖家
    sensitivity: L3
    owner_role: seller_ops
    description: 卖家实体，包含卖家绩效、地理分布、交付指标
    source_tables:
    - dwd_item_level
    grain: seller_id
    retention_days: 730
    property_count: 7
    pii_field_count: 0
    allow_sync_to_feishu: false
  - object_type_id: product
    display_name: 产品
    sensitivity: L0
    owner_role: category_ops
    description: 产品实体，包含品类、价格、重量、评价信息
    source_tables:
    - dwd_item_level
    grain: product_id
    retention_days: 365
    property_count: 8
    pii_field_count: 0
    allow_sync_to_feishu: true
  - object_type_id: category
    display_name: 品类
    sensitivity: L0
    owner_role: category_ops
    description: 品类实体，包含品类GMV、订单数、评价信息
    source_tables:
    - dwd_item_level
    grain: product_category_name
    retention_days: 365
    property_count: 6
    pii_field_count: 0
    allow_sync_to_feishu: true
  - object_type_id: region
    display_name: 区域
    sensitivity: L0
    owner_role: business_ops
    description: 区域实体，包含客户/卖家分布、GMV、配送时效
    source_tables:
    - dwd_order_level
    - dwd_item_level
    grain: state
    retention_days: 365
    property_count: 6
    pii_field_count: 0
    allow_sync_to_feishu: true
  - object_type_id: marketing_lead
    display_name: 营销线索
    sensitivity: L0
    owner_role: marketing_ops
    description: 营销线索实体，包含渠道转化率、GMV信息
    source_tables:
    - channel_classification
    grain: origin
    retention_days: 365
    property_count: 6
    pii_field_count: 0
    allow_sync_to_feishu: true
  - object_type_id: metric_alert
    display_name: 异常事件
    sensitivity: L1
    owner_role: varies by owner_role
    description: 告警实体，包含异常指标、严重程度、负责人
    source_tables:
    - alert_events
    grain: alert_id
    retention_days: 365
    property_count: 8
    pii_field_count: 0
    allow_sync_to_feishu: true
  - object_type_id: channel
    display_name: 渠道
    sensitivity: L1
    owner_role: business_ops
    description: 渠道实体，包含分发规则和适配器配置
    source_tables:
    - channel_routing_rules.yml
    - adapter_registry.yml
    grain: channel_name
    retention_days: 365
    property_count: 4
    pii_field_count: 0
    allow_sync_to_feishu: false
  tables:
  - table_name: dwd_order_level
    sensitivity: L4
    description: DWD层订单事实表
    column_count: 22
    data_type: fact_table
    grain: order_id
  - table_name: dwd_item_level
    sensitivity: L4
    description: DWD层商品事实表
    column_count: 18
    data_type: fact_table
    grain: (order_id, product_id)
  - table_name: metric_daily
    sensitivity: L2
    description: 每日聚合指标表
    column_count: 3
    data_type: aggregated_metric
    grain: (metric_date, metric_name)
  - table_name: metric_dimension_daily
    sensitivity: L2
    description: 维度级别每日指标表
    column_count: 5
    data_type: aggregated_metric
    grain: (metric_date, metric_name, dimension_type, dimension_value)
  - table_name: alert_events
    sensitivity: L3
    description: 触发的异常事件表
    column_count: 12
    data_type: event_table
    grain: alert_id
  - table_name: strategy_recommendations
    sensitivity: L1
    description: AI生成的策略推荐表
    column_count: 7
    data_type: decision_table
    grain: strategy_id
  - table_name: action_tasks
    sensitivity: L3
    description: 执行工作项表
    column_count: 10
    data_type: task_table
    grain: task_id
  - table_name: review_retro
    sensitivity: L1
    description: 执行后分析表
    column_count: 5
    data_type: analysis_table
    grain: retro_id
  - table_name: event_outbox
    sensitivity: L2
    description: 外部分发队列表
    column_count: 10
    data_type: queue_table
    grain: outbox_id
  - table_name: pipeline_runs
    sensitivity: L1
    description: 管道执行记录表
    column_count: 5
    data_type: metadata_table
    grain: run_id
  - table_name: ingestion_batches
    sensitivity: L1
    description: 数据导入批次表
    column_count: 6
    data_type: metadata_table
    grain: batch_id
  - table_name: qoder_jobs
    sensitivity: L2
    description: 外部执行任务表
    column_count: 6
    data_type: metadata_table
    grain: job_id
  api_endpoints:
  - endpoint: /api/v1/health
    method: GET
    sensitivity: L0
    requires_checkpoint: false
    description: Health check endpoint
  - endpoint: /api/v1/status
    method: GET
    sensitivity: L1
    requires_checkpoint: false
    description: System status endpoint
  - endpoint: /api/v1/alerts
    method: GET
    sensitivity: L1
    requires_checkpoint: false
    description: Alert listing endpoint
  - endpoint: /api/v1/tasks
    method: GET
    sensitivity: L2
    requires_checkpoint: false
    description: Task listing endpoint
  - endpoint: /api/v1/outbox
    method: GET
    sensitivity: L1
    requires_checkpoint: false
    description: Outbox queue listing endpoint
  - endpoint: /api/v1/outbox/dispatch
    method: POST
    sensitivity: L2
    requires_checkpoint: true
    checkpoint_rule: CP001
    description: Outbox dispatch endpoint (dry-run/apply)
  - endpoint: /api/v1/logs
    method: GET
    sensitivity: L2
    requires_checkpoint: false
    description: Log retrieval endpoint
  - endpoint: /api/v1/feishu
    method: GET
    sensitivity: L2
    requires_checkpoint: false
    description: Feishu sync status endpoint
  - endpoint: /api/v1/pipeline/run
    method: POST
    sensitivity: L2
    requires_checkpoint: true
    checkpoint_rule: CP002
    description: Pipeline trigger endpoint
  - endpoint: /api/v1/diagnosis
    method: GET
    sensitivity: L1
    requires_checkpoint: false
    description: System diagnosis endpoint
  - endpoint: /api/v1/governance/catalog
    method: GET
    sensitivity: L2
    requires_checkpoint: true
    checkpoint_rule: CP003
    description: Data catalog with sensitivity markings
  - endpoint: /api/v1/governance/lineage
    method: GET
    sensitivity: L1
    requires_checkpoint: false
    description: Pipeline lineage graph
  - endpoint: /api/v1/governance/health
    method: GET
    sensitivity: L2
    requires_checkpoint: false
    description: Health check results
  - endpoint: /api/v1/governance/checkpoints
    method: GET
    sensitivity: L2
    requires_checkpoint: false
    description: Checkpoint history and records
  csv_files:
  - file_name: api_audit_dispatch.csv
    sensitivity: L3
    access_scope: admin
    description: API分发审计日志
    retention_days: 2555
  - file_name: dispatch_archive.csv
    sensitivity: L3
    access_scope: admin
    description: 分发历史记录
    retention_days: 2555
  - file_name: governance_checkpoints.csv
    sensitivity: L3
    access_scope: admin
    description: 治理检查点审计日志
    retention_days: 2555
  feishu_exports:
  - export_name: alert_events
    sensitivity: L2
    frequency: real_time
    description: 异常事件实时发送到飞书
    field_mapping_ref: feishu_field_mapping.yml
