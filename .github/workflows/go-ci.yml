name: Go CI

on:
  push:
    branches: [main, master, "migration/*"]
  pull_request:
    branches: [main, master, "migration/*"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy; run 'go mod tidy'" && exit 1)

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run unit tests (no DB)
        run: |
          go test -v -count=1 -race \
            ./internal/llm/... \
            ./internal/action/... \
            ./internal/governance/... \
            ./internal/ontology/... \
            ./internal/eval/... \
            ./internal/feature/... \
            ./internal/config/... \
            ./internal/alert/... \
            ./internal/recommendation/... \
            ./internal/httputil/... \
            ./internal/api/middleware/... \
            ./internal/decision/... \
            ./internal/adapter/...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: baxi
          POSTGRES_PASSWORD: baxi_test
          POSTGRES_DB: baxi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baxi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://baxi:baxi_test@localhost:5432/baxi_test?sslmode=disable
      API_BEARER_TOKEN: test-token-for-ci-at-least-32-chars-long
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run integration tests
        run: |
          go test -v -count=1 -race -timeout 300s \
            ./internal/repository/... \
            ./internal/service/... \
            ./internal/outbox/... \
            ./internal/worker/... \
            ./internal/api/handler/... \
            ./internal/review/...
