version: ontology.v2
objects:
  seller:
    display_name: 卖家
    description: 电商平台上的销售主体
    grain: seller_id
    source:
      schema: dwd
      table: item_level
      primary_key: seller_id
    properties:
      seller_id:
        type: string
        source: seller_id
        is_pk: true
        sensitivity: L2
        llm_readable: false
        searchable: true
      seller_state:
        type: string
        source: seller_state
        sensitivity: L0
        llm_readable: true
        filterable: true
      seller_city:
        type: string
        source: seller_city
        sensitivity: L0
        llm_readable: true
        filterable: true
      gmv:
        type: float
        source: price
        agg: sum
        sensitivity: L0
        llm_readable: true
      order_count:
        type: int
        source: order_id
        agg: count_distinct
        sensitivity: L0
        llm_readable: true
      avg_review_score:
        type: float
        expression: "AVG(order_level.review_score)"
        sensitivity: L0
        llm_readable: true
      late_delivery_rate:
        type: float
        metric_ref: seller_late_delivery_rate_7d
        sensitivity: L0
        llm_readable: true
    metrics:
      - seller_late_delivery_rate_7d
      - seller_order_count_7d
      - seller_gmv_7d
    relationships:
      recent_orders:
        display_name: 最近订单
        to: order
        cardinality: one_to_many
        strategy: reverse_lookup
        source_key: seller_id
        target:
          schema: dwd
          table: item_level
          key: seller_id
          object_id_field: order_id
        limit: 20
        sort: order_purchase_timestamp desc
        fields:
          - order_id
          - order_status
          - payment_value
          - review_score
          - delivery_status
      products:
        display_name: 关联产品
        to: product
        cardinality: one_to_many
        strategy: reverse_lookup
        source_key: seller_id
        target:
          schema: dwd
          table: item_level
          key: seller_id
          object_id_field: product_id
        limit: 20
    actions:
      - notify_owner
      - create_followup_task
      - export_report
    alert_fields:
      - late_delivery_rate
      - avg_review_score
      - order_count
    governance:
      default_role: agent_readonly
      redact_pii: true

  order:
    display_name: 订单
    description: 电商平台上的客户订单
    grain: order_id
    source:
      schema: dwd
      table: order_level
      primary_key: order_id
    properties:
      order_id:
        type: string
        source: order_id
        is_pk: true
        sensitivity: L2
        llm_readable: false
        searchable: true
      order_status:
        type: string
        source: order_status
        sensitivity: L0
        llm_readable: true
        filterable: true
      payment_value:
        type: float
        source: payment_value
        sensitivity: L1
        llm_readable: true
      review_score:
        type: float
        source: review_score
        sensitivity: L0
        llm_readable: true
      delivery_status:
        type: string
        source: delivery_status
        sensitivity: L0
        llm_readable: true
        filterable: true
    actions:
      - create_followup_task
    alert_fields:
      - review_score
      - order_status
    governance:
      default_role: agent_readonly
      redact_pii: false

  product:
    display_name: 产品
    description: 电商平台上销售的产品
    grain: product_id
    source:
      schema: dwd
      table: item_level
      primary_key: product_id
    properties:
      product_id:
        type: string
        source: product_id
        is_pk: true
        sensitivity: L2
        llm_readable: false
        searchable: true
      product_category_name:
        type: string
        source: product_category_name
        sensitivity: L0
        llm_readable: true
        filterable: true
      product_category_name_english:
        type: string
        source: product_category_name_english
        sensitivity: L0
        llm_readable: true
      price:
        type: float
        source: price
        sensitivity: L1
        llm_readable: true
      freight_value:
        type: float
        source: freight_value
        sensitivity: L1
        llm_readable: true
      avg_review_score:
        type: float
        expression: "AVG(order_level.review_score)"
        sensitivity: L0
        llm_readable: true
    alert_fields:
      - avg_review_score
    governance:
      default_role: agent_readonly
      redact_pii: false

  metric_alert:
    display_name: 异常事件
    description: 系统产生的指标告警事件
    grain: alert_id
    source:
      schema: ops
      table: metric_alert
      primary_key: alert_id
    properties:
      alert_id:
        type: string
        source: alert_id
        is_pk: true
        sensitivity: L2
        llm_readable: false
        searchable: true
      rule_id:
        type: string
        source: rule_id
        sensitivity: L0
        llm_readable: true
        filterable: true
      metric_name:
        type: string
        source: metric_name
        sensitivity: L0
        llm_readable: true
      severity:
        type: string
        source: severity
        sensitivity: L0
        llm_readable: true
        filterable: true
      current_value:
        type: float
        source: current_value
        sensitivity: L0
        llm_readable: true
      baseline_value:
        type: float
        source: baseline_value
        sensitivity: L0
        llm_readable: true
      status:
        type: string
        source: status
        sensitivity: L0
        llm_readable: true
        filterable: true
    actions:
      - create_followup_task
      - notify_owner
    alert_fields:
      - current_value
      - severity
    governance:
      default_role: agent_readonly
      redact_pii: false
