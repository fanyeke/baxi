# Markings: MANDATORY controls (restrict access, binary all-or-nothing)
# Conjunctive (AND): user must satisfy ALL markings on a resource

markings:
  PII:
    mandatory_control: true
    access_type: binary
    conjunctive: true
    inheritance:
      - file_hierarchy
      - data_dependency
    applies_to:
      - raw_customers.customer_unique_id
      - raw_orders.customer_id
      - dwd_order_level.customer_unique_id
      - dwd_order_level.customer_id
    policy: "Do not expose in frontend or Feishu export"
    expand_access_permission: "data_protection_officer"

  OPERATIONAL_INTERNAL:
    mandatory_control: true
    access_type: binary
    conjunctive: true
    inheritance:
      - data_dependency
    applies_to:
      - alert_events
      - strategy_recommendations
      - action_tasks
      - review_retro
      - event_outbox
    policy: "Visible to data_operators and business_ops roles only"
    expand_access_permission: "data_protection_officer"

  FINANCIAL_INTERNAL:
    mandatory_control: true
    access_type: binary
    conjunctive: true
    inheritance:
      - data_dependency
    applies_to:
      - dwd_order_level.payment_value
      - dwd_item_level.price
      - dwd_item_level.freight_value
      - raw_order_payments.payment_value
    policy: "Aggregated GMV is public_internal; raw payment values are internal"
    expand_access_permission: "data_protection_officer"

  RAW_DATA:
    mandatory_control: true
    access_type: binary
    conjunctive: true
    inheritance:
      - data_dependency
    applies_to:
      - raw_customers
      - raw_orders
      - raw_order_items
      - raw_order_payments
      - raw_order_reviews
      - raw_products
      - raw_sellers
      - raw_geolocation
    policy: "Raw data may contain unprocessed PII. Pipeline ingestion should hash/remove before downstream use"
    expand_access_permission: "data_protection_officer"

pipeline_stage_markings:
  - stage: raw
    marking: RAW_DATA
  - stage: processed
    marking: null
