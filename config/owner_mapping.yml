owners:
  - owner_role: business_ops
    business_domain: "总体经营指标"
    metric_scope: [gmv, order_count, avg_order_value]
    dimension_scope: overall
    feishu_user_type: manager_group
    priority_rule: "high severity -> immediate notification"

  - owner_role: seller_ops
    business_domain: "卖家治理"
    metric_scope: [late_delivery_rate, avg_review_score, cancel_rate]
    dimension_scope: seller
    feishu_user_type: ops_group
    priority_rule: "high severity -> task created within 1h"

  - owner_role: category_ops
    business_domain: "品类运营"
    metric_scope: [gmv, avg_review_score]
    dimension_scope: category
    feishu_user_type: ops_group
    priority_rule: "medium severity -> daily digest"

  - owner_role: logistics_ops
    business_domain: "履约物流"
    metric_scope: [late_delivery_rate, freight_value]
    dimension_scope: region
    feishu_user_type: ops_group
    priority_rule: "high severity -> immediate notification"

  - owner_role: marketing_ops
    business_domain: "营销渠道"
    metric_scope: [marketing_seller_share]
    dimension_scope: origin
    feishu_user_type: ops_group
    priority_rule: "medium severity -> weekly review"
