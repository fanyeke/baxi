version: context_recipes.v1
recipes:
  seller_late_delivery_alert:
    description: 卖家延迟发货异常上下文
    trigger:
      object_type: metric_alert
      rule_id: seller_late_delivery_spike
    root_object:
      type_from: alert.object_type
      id_from: alert.object_id
    include:
      root_properties:
        - seller_state
        - seller_city
        - gmv
        - order_count
        - avg_review_score
        - late_delivery_rate
      metrics:
        - seller_late_delivery_rate_7d
        - seller_order_count_7d
        - seller_avg_review_score_7d
        - seller_gmv_7d
      links:
        recent_orders:
          limit: 10
          fields:
            - order_id
            - order_status
            - payment_value
            - review_score
            - delivery_status
      actions:
        - notify_owner
        - create_followup_task
        - export_report
    budget:
      max_link_depth: 2
      max_objects: 30
      max_tokens_hint: 4000
    governance:
      role: agent_readonly
      redact_pii: true
    evidence_rules:
      - source: "metric:seller_late_delivery_rate_7d"
        interpretation: "Seller {object_id} late delivery rate is {current} (baseline: {baseline}, delta: {delta}), severity: {severity}"
      - source: "metric:seller_order_count_7d"
        interpretation: "Seller {object_id} has {current} orders in last 7 days (baseline: {baseline})"
      - source: "metric:seller_gmv_7d"
        interpretation: "Seller {object_id} GMV is {current} (baseline: {baseline})"
      - source: "metric:seller_avg_review_score_7d"
        interpretation: "Seller {object_id} average review score is {current} (baseline: {baseline})"
      - source: "link:recent_orders"
        interpretation: "Recent orders show delivery and review patterns"
    decision_guidance:
      levels:
        - severity: low
          recommendation: "Monitor, no action needed"
          actions: []
        - severity: medium
          recommendation: "Create followup task for seller ops review"
          actions:
            - create_followup_task
        - severity: high
          recommendation: "Notify seller operations team for intervention"
          actions:
            - create_followup_task
            - notify_owner
        - severity: critical
          recommendation: "Immediate escalation — export report and notify owner"
          actions:
            - create_followup_task
            - notify_owner
            - export_report

  order_anomaly_alert:
    description: Order anomaly detection context
    trigger:
      object_type: metric_alert
      rule_id: order_anomaly
    root_object:
      type_from: alert.object_type
      id_from: alert.object_id
    include:
      root_properties:
        - region_id
        - region_name
        - seller_count
        - order_count_7d
        - late_delivery_rate_7d
        - gmv_7d
      metrics:
        - region_late_delivery_rate_7d
        - region_order_count_7d
        - region_gmv_7d
      links:
        sellers:
          limit: 15
          fields:
            - seller_id
            - seller_name
            - seller_state
            - late_delivery_rate
        customers:
          limit: 15
          fields:
            - customer_id
            - customer_name
            - order_count
            - gmv
      actions:
        - create_followup_task
        - notify_owner
        - export_report
    evidence_rules:
      - source: "metric:region_late_delivery_rate_7d"
        interpretation: "Region {object_id} late delivery rate is {current} (baseline: {baseline}, delta: {delta}), severity: {severity}"
      - source: "metric:region_order_count_7d"
        interpretation: "Region {object_id} has {current} orders in last 7 days (baseline: {baseline})"
      - source: "metric:region_gmv_7d"
        interpretation: "Region {object_id} GMV is {current} (baseline: {baseline})"
      - source: "link:sellers"
        interpretation: "Sellers in this region show delivery and order patterns"
    decision_guidance:
      levels:
        - severity: low
          recommendation: "Monitor, no action needed"
          actions: []
        - severity: medium
          recommendation: "Review logistics in the region"
          actions:
            - create_followup_task
        - severity: high
          recommendation: "Notify regional ops team for intervention"
          actions:
            - create_followup_task
            - notify_owner
        - severity: critical
          recommendation: "Immediate escalation to logistics director — export report and notify owner"
          actions:
            - create_followup_task
            - notify_owner
            - export_report
    budget:
      max_link_depth: 2
      max_objects: 30
      max_tokens_hint: 4000
    governance:
      role: agent_readonly
      redact_pii: true

