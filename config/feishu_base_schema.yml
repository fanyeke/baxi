tables:
  - table_id: daily_metrics
    display_name: "每日经营指标"
    purpose: "管理层看趋势"
    primary_key: [simulated_date]
    fields:
      - field_id: real_run_date
        field_name: "执行日期"
        type: date
        required: true
      - field_id: simulated_date
        field_name: "业务日期"
        type: date
        required: true
      - field_id: gmv
        field_name: "GMV(R$)"
        type: number
        format: currency
      - field_id: order_count
        field_name: "订单数"
        type: number
      - field_id: customer_count
        field_name: "客户数"
        type: number
      - field_id: seller_count
        field_name: "卖家数"
        type: number
      - field_id: avg_order_value
        field_name: "客单价(R$)"
        type: number
        format: currency
      - field_id: avg_review_score
        field_name: "平均评分"
        type: number
        range: [1, 5]
      - field_id: low_review_rate
        field_name: "差评率"
        type: number
        format: percent
      - field_id: late_delivery_rate
        field_name: "延迟配送率"
        type: number
        format: percent
      - field_id: cancel_rate
        field_name: "取消率"
        type: number
        format: percent
      - field_id: alert_count
        field_name: "异常数量"
        type: number
    view_config:
      default_view: "latest_30d"
      charts: ["line_chart"]

  - table_id: alert_events
    display_name: "异常事件表"
    purpose: "运营处理异常"
    primary_key: [alert_id]
    fields:
      - field_id: alert_id
        field_name: "事件ID"
        type: text
        required: true
      - field_id: real_run_date
        field_name: "执行日期"
        type: date
        required: true
      - field_id: simulated_date
        field_name: "业务日期"
        type: date
      - field_id: severity
        field_name: "严重等级"
        type: single_select
        options: [high, medium, low]
        enum_ref: status_enums.alert_event_status
      - field_id: object_type
        field_name: "对象类型"
        type: text
      - field_id: object_id
        field_name: "对象ID"
        type: text
      - field_id: metric_name
        field_name: "指标"
        type: text
      - field_id: current_value
        field_name: "当前值"
        type: number
      - field_id: baseline_value
        field_name: "基线值"
        type: number
      - field_id: description
        field_name: "异常描述"
        type: text_long
      - field_id: owner_role
        field_name: "负责人角色"
        type: text
        enum_ref: owner_mapping
      - field_id: status
        field_name: "状态"
        type: single_select
        options: [new, investigating, strategy_generated, task_created, resolved, ignored]
        enum_ref: status_enums.alert_event_status
        default: new
      - field_id: rule_id
        field_name: "规则ID"
        type: text
      - field_id: event_date
        field_name: "事件日期"
        type: date
      - field_id: change_rate
        field_name: "变化率"
        type: number
        format: percent
      - field_id: sample_size
        field_name: "样本量"
        type: number
      - field_id: affected_orders
        field_name: "受影响订单数"
        type: number
      - field_id: affected_gmv
        field_name: "受影响GMV"
        type: number
        format: currency
      - field_id: impact_score
        field_name: "影响分数"
        type: number
    view_config:
      default_view: "open_by_severity"

  - table_id: action_tasks
    display_name: "负责人任务表"
    purpose: "员工执行"
    primary_key: [task_id]
    fields:
      - field_id: task_id
        field_name: "任务ID"
        type: text
        required: true
      - field_id: title
        field_name: "任务标题"
        type: text
        required: true
      - field_id: description
        field_name: "任务说明"
        type: text_long
      - field_id: owner
        field_name: "负责人"
        type: text
      - field_id: source_event
        field_name: "来源事件"
        type: text
      - field_id: source_strategy
        field_name: "来源策略"
        type: text
      - field_id: priority
        field_name: "优先级"
        type: single_select
        options: [high, medium, low]
      - field_id: deadline
        field_name: "截止时间"
        type: date
      - field_id: status
        field_name: "状态"
        type: single_select
        options: [todo, in_progress, blocked, done, cancelled]
        enum_ref: status_enums.task_status
        default: todo
      - field_id: feedback
        field_name: "执行反馈"
        type: text_long
      - field_id: completed_at
        field_name: "完成时间"
        type: datetime
      - field_id: target_object_type
        field_name: "目标对象类型"
        type: text
      - field_id: target_object_id
        field_name: "目标对象ID"
        type: text
      - field_id: recommendation_id
        field_name: "关联建议ID"
        type: text
      - field_id: event_id
        field_name: "关联事件ID"
        type: text
      - field_id: created_at
        field_name: "创建时间"
        type: datetime
      - field_id: task_source
        field_name: "任务来源"
        type: text
    view_config:
      default_view: "by_owner_status"

  - table_id: recommendations
    display_name: "策略建议表"
    purpose: "Agent生成的建议"
    primary_key: [recommendation_id]
    fields:
      - field_id: recommendation_id
        field_name: "建议ID"
        type: text
        required: true
      - field_id: event_id
        field_name: "关联事件ID"
        type: text
      - field_id: title
        field_name: "策略标题"
        type: text
        required: true
      - field_id: detail
        field_name: "策略详情"
        type: text_long
      - field_id: target_object_type
        field_name: "目标对象类型"
        type: text
      - field_id: target_object_id
        field_name: "目标对象ID"
        type: text
      - field_id: expected_impact
        field_name: "预期影响"
        type: text
      - field_id: risk_level
        field_name: "风险等级"
        type: single_select
        options: [high, medium, low]
        enum_ref: action_registry
      - field_id: requires_approval
        field_name: "是否需要审批"
        type: checkbox
      - field_id: owner
        field_name: "负责人"
        type: text
      - field_id: approval_status
        field_name: "审批状态"
        type: single_select
        options: [draft, pending_review, approved, rejected, executing, completed, invalidated]
        enum_ref: status_enums.strategy_status
        default: draft
      - field_id: status
        field_name: "执行状态"
        type: single_select
        options: [draft, pending_review, approved, rejected, executing, completed, invalidated]
        enum_ref: status_enums.strategy_status
      - field_id: created_at
        field_name: "创建时间"
        type: datetime
      - field_id: decision_source
        field_name: "决策来源"
        type: text
      - field_id: rule_id
        field_name: "规则ID"
        type: text
      - field_id: confidence
        field_name: "置信度"
        type: text
      - field_id: success_metric
        field_name: "成功指标"
        type: text
    view_config:
      default_view: "by_risk_status"

  - table_id: review_retro
    display_name: "执行复盘表"
    purpose: "闭环验证"
    primary_key: [review_id]
    fields:
      - field_id: review_id
        field_name: "复盘ID"
        type: text
        required: true
      - field_id: recommendation_id
        field_name: "关联建议ID"
        type: text
      - field_id: task_id
        field_name: "关联任务ID"
        type: text
      - field_id: review_type
        field_name: "复盘类型"
        type: text
      - field_id: review_source
        field_name: "复盘来源"
        type: text
      - field_id: outcome
        field_name: "执行结果"
        type: text_long
      - field_id: actual_impact
        field_name: "实际影响"
        type: text
      - field_id: is_effective
        field_name: "是否有效"
        type: checkbox
      - field_id: lessons_learned
        field_name: "经验总结"
        type: text_long
      - field_id: promote_to_rule
        field_name: "是否沉淀为规则"
        type: checkbox
      - field_id: reviewed_at
        field_name: "复盘时间"
        type: datetime
      - field_id: status
        field_name: "状态"
        type: single_select
        options: [draft, in_review, completed]
        default: draft
      - field_id: feedback
        field_name: "反馈"
        type: text_long
    view_config:
      default_view: "all_reviews"
